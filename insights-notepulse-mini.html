<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insights - NotePulse Mini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main data-testid="setfarm-app-root" class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark">◆</span>
          <h1>NotePulse Mini</h1>
        </div>
        <nav class="app-nav" aria-label="Primary">
          <a href="four-operations-notepulse-mini.html" class="nav-link">Operations</a>
          <a href="four-editor-notepulse-mini.html" class="nav-link">Editor</a>
          <a href="insights-notepulse-mini.html" class="nav-link active">Insights</a>
        </nav>
        <div class="header-actions">
          <button
            type="button"
            class="btn btn-secondary"
            data-action-id="ACT_EXPORT_SUMMARY"
            onclick="window.actExportSummary && window.actExportSummary(event);"
          >
            Export JSON Summary
          </button>
          <button
            type="button"
            class="btn btn-ghost"
            data-action-id="ACT_RETRY_LOAD"
            onclick="window.actRetryLoad && window.actRetryLoad(event);"
          >
            Retry Load
          </button>
        </div>
      </header>
      <div class="app-main">
        <section class="view insights-view">
          <div class="metrics">
            <div class="metric-card">
              <span class="metric-value" data-metric="total">0</span>
              <span class="metric-label">Total</span>
            </div>
            <div class="metric-card status-active">
              <span class="metric-value" data-metric="active">0</span>
              <span class="metric-label">Active</span>
            </div>
            <div class="metric-card status-warn">
              <span class="metric-value" data-metric="warn">0</span>
              <span class="metric-label">Warn</span>
            </div>
            <div class="metric-card status-fail">
              <span class="metric-value" data-metric="fail">0</span>
              <span class="metric-label">Fail</span>
            </div>
          </div>
          <div class="panel">
            <h2>Recent Activity</h2>
            <ul class="recent-list" data-recent-list>
              <li>No activity yet.</li>
            </ul>
          </div>
          <div class="view-toolbar">
            <button
              type="button"
              class="btn btn-secondary"
              data-action-id="ACT_FILTER_INSIGHTS"
              onclick="window.actFilterInsights && window.actFilterInsights(event);"
            >
              Filter Insights
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-action-id="resolve-insights"
              onclick="window.NotePulseStore && window.NotePulseStore.resolveAllNotes();"
            >
              Resolve
            </button>
          </div>
        </section>
      </div>
    </main>
    <script src="assets/js/notepulse-mini.storage.js" defer></script>
    <script src="assets/js/notepulse-mini.state.js" defer></script>
    <script src="assets/js/us-002/act_retry_load.js" defer></script>
    <script src="assets/js/us-003/act_filter_insights.js" defer></script>
    <script src="assets/js/us-003/act_export_summary.js" defer></script>
    <script defer>
      (function () {
        'use strict';

        function renderInsightsStatic() {
          var store = window.NotePulseStore;
          if (!store || !store.getState) return;
          var state = store.getState();
          if (!state) return;

          var counts = {};
          store.STATUS.forEach(function (status) {
            counts[status] = state.notes.filter(function (n) {
              return n.status === status;
            }).length;
          });

          var totalEl = document.querySelector('[data-metric="total"]');
          var activeEl = document.querySelector('[data-metric="active"]');
          var warnEl = document.querySelector('[data-metric="warn"]');
          var failEl = document.querySelector('[data-metric="fail"]');

          if (totalEl) totalEl.textContent = String(state.notes.length);
          if (activeEl) activeEl.textContent = String(counts.active);
          if (warnEl) warnEl.textContent = String(counts.warn);
          if (failEl) failEl.textContent = String(counts.fail);

          var recentList = document.querySelector('[data-recent-list]');
          if (recentList) {
            var recent = state.notes
              .slice()
              .sort(function (a, b) {
                return b.updatedAt.localeCompare(a.updatedAt);
              })
              .slice(0, 4);

            recentList.innerHTML = '';
            if (recent.length === 0) {
              recentList.appendChild(document.createElement('li')).textContent = 'No activity yet.';
            } else {
              recent.forEach(function (note) {
                var li = document.createElement('li');
                li.textContent = (note.title || '(untitled)') + ' — ' + note.status;
                recentList.appendChild(li);
              });
            }
          }
        }

        function init() {
          if (window.NotePulseStore) {
            window.NotePulseStore.setView('insights');
            window.NotePulseStore.subscribe(renderInsightsStatic);
            renderInsightsStatic();
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
