<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Four Editor - NotePulse Mini</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdbcf",
                        "surface-container-low": "#f3f3fd",
                        "on-secondary-container": "#576377",
                        "on-secondary-fixed-variant": "#3b475b",
                        "tertiary-container": "#a33500",
                        "inverse-on-surface": "#f0f0fb",
                        "outline": "#737685",
                        "tertiary-fixed-dim": "#ffb59b",
                        "primary": "#003d9b",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#101c2d",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d4e0f8",
                        "inverse-primary": "#b2c5ff",
                        "surface-container-high": "#e7e7f2",
                        "on-primary-fixed": "#001848",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#434654",
                        "on-tertiary": "#ffffff",
                        "background": "#faf8ff",
                        "on-primary-fixed-variant": "#0040a2",
                        "surface": "#faf8ff",
                        "outline-variant": "#c3c6d6",
                        "primary-fixed-dim": "#b2c5ff",
                        "tertiary": "#7b2600",
                        "surface-dim": "#d9d9e4",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dae2ff",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e1e2ec",
                        "on-primary-container": "#c4d2ff",
                        "secondary-fixed-dim": "#bbc7de",
                        "surface-tint": "#0c56d0",
                        "secondary": "#535f73",
                        "surface-bright": "#faf8ff",
                        "on-tertiary-fixed-variant": "#812800",
                        "surface-variant": "#e1e2ec",
                        "inverse-surface": "#2e3038",
                        "on-tertiary-fixed": "#380d00",
                        "surface-container": "#ededf8",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#d7e3fb",
                        "on-surface": "#191b23",
                        "on-tertiary-container": "#ffc6b2",
                        "primary-container": "#0052cc",
                        "on-background": "#191b23"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "element-gap": "4px",
                        "container-padding": "12px",
                        "stack-gap": "8px",
                        "grid-gutter": "12px",
                        "unit": "4px"
                    },
                    fontFamily: {
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-sm": ["Inter"],
                        "mono-label": ["JetBrains Mono"]
                    },
                    fontSize: {
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-md": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "label-caps": ["10px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "mono-label": ["11px", { "lineHeight": "14px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: theme('colors.background'); color: theme('colors.on-background'); }
        /* Hide scrollbar for clean look in utility apps */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: theme('colors.outline-variant'); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: theme('colors.outline'); }
    </style>
</head>
<body class="flex flex-col min-h-screen font-body-md text-body-md bg-background">
<!-- TopNavBar -->
<nav class="bg-surface text-primary font-headline-sm text-headline-sm flex justify-between items-center px-container-padding h-12 w-full max-w-full border-b border-outline-variant flat no shadows docked full-width top-0 z-40">
<div class="flex items-center gap-container-padding h-full">
<span class="font-headline-sm text-headline-sm font-bold text-primary mr-4">NotePulse Mini</span>
<div class="hidden md:flex h-full items-end gap-stack-gap">
<!-- Inactive -->
<a class="text-secondary hover:text-primary pb-1 cursor-pointer active:opacity-80 transition-colors" href="#">Operations</a>
<!-- Active -->
<a class="text-primary border-b-2 border-primary pb-1 cursor-pointer active:opacity-80 transition-colors" href="#">Editor</a>
<!-- Inactive -->
<a class="text-secondary hover:text-primary pb-1 cursor-pointer active:opacity-80 transition-colors" href="#">Insights</a>
</div>
</div>
<div class="flex items-center gap-element-gap">
<button class="p-1 rounded text-secondary hover:bg-surface-container-low transition-colors cursor-pointer active:opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 20px;">sync</span>
</button>
<button class="p-1 rounded text-secondary hover:bg-surface-container-low transition-colors cursor-pointer active:opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 20px;">settings</span>
</button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto p-container-padding flex justify-center items-start pt-8 pb-16">
<!-- Editor Card -->
<div class="w-full max-w-2xl bg-surface-container-lowest border border-outline-variant rounded-lg p-container-padding flex flex-col gap-grid-gutter shadow-sm">
<!-- Header & Status -->
<div class="flex justify-between items-center border-b border-outline-variant pb-unit">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Edit Data Record</h1>
<div class="flex items-center gap-element-gap bg-tertiary-fixed-dim text-on-tertiary-fixed-variant px-2 py-0.5 rounded-full">
<span class="material-symbols-outlined" style="font-size: 12px; font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
<span class="font-label-caps text-label-caps uppercase tracking-wider">Unsaved Changes</span>
</div>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-gap">
<!-- Field: Title (Error State Demonstrated) -->
<div class="flex flex-col gap-element-gap">
<label class="font-body-sm text-body-sm font-bold text-on-surface flex justify-between" for="title-input">
<span>Title <span class="text-error">*</span></span>
</label>
<input aria-describedby="title-error" aria-invalid="true" class="w-full bg-surface border border-error rounded px-2 h-[32px] font-body-md text-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-error transition-colors" id="title-input" placeholder="Enter a precise identifier..." type="text" value=""/>
<div class="flex items-center gap-1 text-error font-body-sm text-body-sm mt-0.5" id="title-error">
<span class="material-symbols-outlined" style="font-size: 14px;">error</span>
<span>Title is required to save the record.</span>
</div>
</div>
<!-- Field: Content -->
<div class="flex flex-col gap-element-gap">
<label class="font-body-sm text-body-sm font-bold text-on-surface flex justify-between" for="content-input">
<span>Content <span class="text-error">*</span></span>
<span class="font-mono-label text-mono-label text-secondary font-normal">Markdown Supported</span>
</label>
<textarea class="w-full bg-surface border border-outline-variant rounded p-2 min-h-[160px] resize-y font-body-md text-body-md text-on-surface focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-colors" id="content-input" placeholder="Document the procedural details here..."></textarea>
</div>
<!-- Field: Status (Custom Deterministic Selection) -->
<div class="flex flex-col gap-element-gap">
<label class="font-body-sm text-body-sm font-bold text-on-surface">Execution Status</label>
<div class="flex gap-element-gap">
<!-- Active Option (Selected) -->
<button class="flex-1 h-[28px] bg-primary-container text-on-primary-container border border-primary font-body-sm text-body-sm font-bold rounded flex items-center justify-center gap-1 transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 16px; font-variation-settings: 'FILL' 1;">check_circle</span>
                            Active
                        </button>
<!-- Warn Option -->
<button class="flex-1 h-[28px] bg-surface text-on-surface-variant border border-outline-variant font-body-sm text-body-sm font-bold rounded flex items-center justify-center gap-1 hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 16px;">warning</span>
                            Warn
                        </button>
<!-- Fail Option -->
<button class="flex-1 h-[28px] bg-surface text-on-surface-variant border border-outline-variant font-body-sm text-body-sm font-bold rounded flex items-center justify-center gap-1 hover:bg-error-container hover:text-on-error-container hover:border-error-container transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 16px;">cancel</span>
                            Fail
                        </button>
</div>
</div>
</form>
<hr class="border-outline-variant my-1"/>
<!-- Actions -->
<div class="flex justify-end items-center gap-stack-gap">
<button class="h-[28px] px-3 font-body-sm text-body-sm font-bold text-secondary border border-outline-variant rounded hover:bg-surface-variant hover:text-on-surface transition-colors focus:outline-none focus:ring-1 focus:ring-secondary" type="button">
                    Cancel Edit
                </button>
<button class="h-[32px] px-4 font-body-sm text-body-sm font-bold bg-primary text-on-primary rounded flex items-center gap-1 hover:opacity-90 transition-opacity shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 focus:ring-offset-surface" type="button">
<span class="material-symbols-outlined" style="font-size: 18px;">save</span>
                    Save Record
                </button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-lowest text-primary font-body-sm text-body-sm fixed bottom-0 w-full z-50 flex justify-between items-center px-container-padding h-10 border-t border-outline-variant flat no shadows docked full-width">
<div class="font-label-caps text-label-caps text-secondary uppercase tracking-wider">
            NotePulse Mini v1.0
        </div>
<div class="flex items-center gap-container-padding">
<a class="text-on-secondary-container hover:underline hover:text-primary cursor-pointer transition-colors" href="#">Export JSON Summary</a>
<a class="text-on-secondary-container hover:underline hover:text-primary cursor-pointer transition-colors" href="#">Retry Load</a>
</div>
</footer>
</body></html>
